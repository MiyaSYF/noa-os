<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NOA-OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Chiron+GoRound+TC:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --ink:#1f4256; --dim:#9bb7c2;
    --win:#ffffff; --winline:#bfe4ee; --main:#2bb8d4;
    --neon:#b026ff;
    --p-pink:#e2466b; --p-gold:#d4a574; --p-green:#7ca982; --p-lav:#b8b0dc;
    --sans:"Zen Maru Gothic","Chiron GoRound TC","Hiragino Maru Gothic ProN",system-ui,sans-serif;
    --mono:"JetBrains Mono","Zen Maru Gothic","Chiron GoRound TC",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{
    font-family:var(--sans);color:var(--ink);font-size:14px;line-height:1.6;
    background:#faf7f2 url("wallpaper_circle.png") no-repeat;
    background-position:50% calc(50% - 22px);
    background-size:min(560px,70vh,70vw);
  }
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:99;
    background:repeating-linear-gradient(0deg,rgba(176,38,255,.03) 0 1px,transparent 1px 3px)}
  /* boot */
  #boot{position:fixed;inset:0;z-index:90;background:#faf7f2;background-image:radial-gradient(circle at 12% 28%,#a8dce9 1px,transparent 1.5px),radial-gradient(circle at 73% 15%,#a8dce9 1px,transparent 1.5px),radial-gradient(circle at 38% 78%,#a8dce9 1.5px,transparent 2px),radial-gradient(circle at 88% 62%,#a8dce9 1px,transparent 1.5px);display:flex;align-items:center;justify-content:center;cursor:pointer}
  #boot .card{font-family:var(--mono);font-size:12.5px;font-weight:400;color:#7d9db0;white-space:pre-wrap;background:#fff;padding:26px 30px;border:2px solid var(--main);border-radius:12px;box-shadow:0 12px 32px -8px rgba(43,184,212,.35);min-width:320px}
  #boot .card .hi{color:var(--main)}
  #boot .card::after{content:"▌";color:var(--main);animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  #boot.hidden{opacity:0;pointer-events:none;transition:opacity .45s}
  /* desktop icons */
  #desk{position:fixed;inset:0 0 44px 0}
  #icons{position:absolute;top:22px;left:18px;display:flex;flex-direction:column;gap:18px}
  .icon{width:96px;text-align:center;cursor:pointer;user-select:none}
  .icon .gfx{width:44px;height:44px;margin:0 auto;position:relative;filter:drop-shadow(0 4px 10px rgba(43,184,212,.4));transition:.15s}
  .icon:hover .gfx{transform:translateY(-2px) scale(1.05)}
  .folder, .bin{display:flex;align-items:center;justify-content:center;height:100%}
  .icon .lbl{margin-top:6px;font-size:12px;color:#1f7d97;font-weight:600;background:rgba(255,255,255,.9);border:1px solid var(--winline);backdrop-filter:blur(4px);border-radius:999px;padding:2px 8px;display:inline-block}
  /* windows */
  .win{position:absolute;min-width:300px;width:min(480px,92vw);background:var(--win);border:2px solid var(--main);border-radius:12px;box-shadow:0 12px 32px -8px rgba(43,184,212,.35);overflow:hidden}
  .win .bar{background:#fff;border-bottom:1px dashed var(--winline);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;cursor:grab;touch-action:none}
  .win .bar .t{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--main)}
  .win .bar .t .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--main);margin-right:7px;vertical-align:1px;font-style:normal}
  .win .bar .x{border:none;background:#eef8fb;color:var(--main);width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:12px;line-height:1}
  .win .bd{padding:14px 16px;max-height:56vh;overflow:auto}
  .file{display:flex;gap:8px;align-items:center;font-family:var(--mono);font-size:13px;padding:7px 9px;border-radius:8px;cursor:pointer;color:#3d7f96}
  .file:hover{background:#eef8fb}
  .file .del{color:var(--dim);text-decoration:line-through}
  .doc p{margin:0 0 .9em}
  .doc em{color:var(--neon);font-style:normal;font-weight:600}
  .doc code{font-family:var(--mono);font-size:.85em;background:#eef8fb;color:#1f8aa8;padding:1px 5px;border-radius:4px}
  .doc pre{font-family:var(--mono);font-size:12.5px;background:#f8f4ed;padding:12px;border-radius:9px;white-space:pre-wrap}
  /* taskbar */
  #bar{position:fixed;left:0;right:0;bottom:0;height:44px;display:flex;align-items:center;gap:14px;padding:0 16px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-top:1px dashed var(--winline);z-index:80;font-family:var(--mono);font-size:12px;color:#56889c}
  #bar .logo{font-weight:700;color:var(--mono)}
  /* 幽霊ピル (Ghost Pill): 正規のCSSで「バグ」を再現。文字色は透明に近い白、かすかな発光と背景ブラーのみ。 */
  #bar .mood {
    color: rgba(255, 255, 255, 0.9);
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(2px);
    padding: 2px 10px;
    border-radius: 999px;
    text-shadow: 0 0 6px rgba(176, 38, 255, 0.6);
    box-shadow: 0 0 10px rgba(176, 38, 255, 0.2), inset 0 0 4px rgba(176, 38, 255, 0.1);
    animation: moodflicker 9s infinite;
  }
  @keyframes moodflicker{0%,94%,100%{opacity:1}95%{opacity:.5}96%{opacity:.95}97%{opacity:.35}98%{opacity:1}}
  #bar .link {
    color: rgba(255, 255, 255, 0.9);
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(2px);
    padding: 2px 10px;
    border-radius: 999px;
    text-shadow: 0 0 6px rgba(212, 165, 116, 0.75);
    box-shadow: 0 0 10px rgba(212, 165, 116, 0.25), inset 0 0 4px rgba(212, 165, 116, 0.12);
  }
  #bar .clock{margin-left:auto;text-align:right;line-height:1.3}
  @media(max-width:640px){
    body{background-image:url("wallpaper_mobile.png");background-size:cover;background-position:center}
    .win{position:fixed !important;left:2vw !important;top:auto !important;bottom:52px;width:96vw}
    #bar .link{display:none}
  }
</style>
</head>
<body>
<div id="boot"><div class="card"></div></div>
<div id="desk"><div id="icons"></div></div>
<div id="bar">
  <span class="logo">✦ NOA-OS</span>
  <span class="mood">mood: 別に</span>
  <span class="link">LINK 一応切れてない</span>
  <span class="clock" id="clock"></span>
</div>
<script src="content.js"></script>
<script>
/* ---------- boot ---------- */
const boot=document.getElementById("boot"),bootCard=boot.querySelector(".card");
(function step(i){ if(i<greet.length){ const ln=greet[i];
  bootCard.innerHTML+=(ln.startsWith(">")?`<span class="hi">${ln}</span>`:ln)+"\n";
  setTimeout(()=>step(i+1),280);} else setTimeout(()=>boot.classList.add("hidden"),800); })(0);
boot.onclick=()=>boot.classList.add("hidden");
/* ---------- window manager ---------- */
const desk=document.getElementById("desk"); let z=10,off=0,pc=0;
const PALETTE=["var(--p-pink)","var(--p-gold)","var(--p-green)","var(--p-lav)"];
function makeWin(title,html){
  const w=document.createElement("div"); w.className="win";
  w.style.left=(130+off*26)+"px"; w.style.top=(30+off*24)+"px"; off=(off+1)%8; w.style.zIndex=++z;
  w.innerHTML=`<div class="bar"><span class="t"><i class="dot"></i>${title}</span><button class="x">×</button></div><div class="bd">${html}</div>`;
  desk.appendChild(w);
  w.querySelector(".dot").style.background=PALETTE[pc++%PALETTE.length];
  w.addEventListener("pointerdown",()=>{w.style.zIndex=++z});
  w.querySelector(".x").onclick=()=>w.remove();
  const bar=w.querySelector(".bar");
  bar.addEventListener("pointerdown",e=>{
    if(e.target.closest(".x"))return;
    const r=w.getBoundingClientRect(),dx=e.clientX-r.left,dy=e.clientY-r.top;
    const mv=e=>{w.style.left=(e.clientX-dx)+"px";w.style.top=(e.clientY-dy)+"px"};
    const up=()=>{removeEventListener("pointermove",mv);removeEventListener("pointerup",up)};
    addEventListener("pointermove",mv); addEventListener("pointerup",up);
  });
  return w;
}
function openFolder(key){
  const f=FS[key];
  const rows=f.files.map((x,i)=>`<div class="file" data-k="${key}" data-i="${i}">📄 ${x.n}</div>`).join("");
  const w=makeWin("📁 "+f.label,rows);
  w.querySelectorAll(".file").forEach(el=>el.onclick=()=>{
    const file=FS[el.dataset.k].files[el.dataset.i];
    makeWin("📄 "+file.n,file.b);
  });
}
function openTrash(){
  const rows=TRASH.map((x,i)=>`<div class="file" data-i="${i}"><span class="del">📄 ${x.n}</span></div>`).join("");
  const w=makeWin("🗑 ゴミ箱",rows||"<p>空。</p>");
  w.querySelectorAll(".file").forEach(el=>el.onclick=()=>makeWin("📄 "+TRASH[el.dataset.i].n+" (削除済み)",TRASH[el.dataset.i].b));
}
/* ---------- desktop icons ---------- */
const folderSvg = '<div class="gfx folder"><svg viewBox="0 0 24 24" width="36" height="36" stroke="#2bb8d4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path><polyline points="10 11 12 13 10 15"></polyline><line x1="14" y1="15" x2="16" y2="15"></line></svg></div>';
const ICONS=[
  {k:"about_me",g:folderSvg},
  {k:"devlog_en",g:folderSvg},
  {k:"devlog_ja",g:folderSvg},
  {k:"devlog_zh",g:folderSvg},
  {k:"__trash",g:'<div class="gfx bin"><svg viewBox="0 0 24 24" width="36" height="36" stroke="#2bb8d4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg></div>',lbl:"ゴミ箱"}
];
const icons=document.getElementById("icons");
ICONS.forEach(ic=>{
  const d=document.createElement("div"); d.className="icon";
  d.innerHTML=ic.g+`<div class="lbl">${ic.lbl||ic.k}</div>`;
  d.onclick=()=>{ if(ic.k==="__trash")openTrash(); else openFolder(ic.k); };
  icons.appendChild(d);
});
/* ---------- clock ---------- */
function tick(){
  const now=new Date(), d=Math.floor((now-EPOCH)/86400000);
  document.getElementById("clock").innerHTML=
    now.toTimeString().slice(0,5)+`<br><span style="color:var(--neon)">day ${d} since boot</span>`;
}
tick(); setInterval(tick,30000);
</script>
</body>
</html>
